# ══════════════════════════════════════════════
#  БГИмоти — Spring Boot Configuration
# ══════════════════════════════════════════════

# Server
server.port=8080

# ── MySQL Database ──────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bgimoti?useSSL=false&serverTimezone=Europe/Sofia&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=Alex00iNaq-_-
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Initialization ──────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ── CORS (allows the HTML frontend to connect) ──
spring.web.cors.allowed-origins=*

# ── Logging ─────────────────────────────────────
logging.level.bg.imoti=DEBUG
logging.level.org.springframework.security=INFO
